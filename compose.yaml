services:
  ears:
    build:
      context: .
      dockerfile: apps/ears/Dockerfile
    image: banananet-ears
    init: true
    stdin_open: true
    tty: true
    restart: unless-stopped
    ports:
      - "3001:80"
    env_file: .env
    environment:
      TZ: Australia/Melbourne
      CONTAINER_APP_PORT: "80"
